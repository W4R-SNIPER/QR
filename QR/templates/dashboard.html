<!DOCTYPE html>
<html>
<head><title>Dashboard</title></head>
<body>

<h2>QR Dashboard</h2>

<table border="1" cellpadding="10">
<tr><th>ID</th><th>Data</th><th>Scans</th></tr>

{% for row in data %}
<tr>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
