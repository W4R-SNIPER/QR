<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Generator</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
}

/* HEADER */
.header {
    text-align: center;
    padding: 30px;
    font-size: 30px;
    font-weight: 600;
}

.header span {
    background: linear-gradient(90deg, #3b82f6, #6366f1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* MAIN */
.container {
    display: flex;
    padding: 20px;
    gap: 20px;
}

/* LEFT PANEL */
.left {
    flex: 2;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

/* INPUT */
.input-box {
    display: flex;
    gap: 10px;
}

.input-box input {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #ddd;
    outline: none;
    transition: 0.2s;
}

.input-box input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
}

.input-box button {
    padding: 14px 22px;
    background: linear-gradient(90deg, #3b82f6, #6366f1);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.input-box button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(59,130,246,0.3);
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-top: 20px;
}

.card {
    padding: 16px;
    border-radius: 12px;
    background: #ffffff;
    border: 1px solid #e5e7eb;
    cursor: pointer;
    transition: 0.25s;
    font-weight: 500;
}

.card:hover {
    background: #eff6ff;
    transform: translateY(-4px) scale(1.02);
    border-color: #3b82f6;
}

/* RIGHT PANEL */
.right {
    flex: 1;
    text-align: center;
}

/* QR BOX */
.qr-box {
    background: rgba(255,255,255,0.9);
    padding: 30px;
    border-radius: 16px;
    border: 2px dashed #d1d5db;
    backdrop-filter: blur(10px);
}

.qr-box img {
    width: 200px;
}

/* DOWNLOAD BUTTON */
.download {
    margin-top: 15px;
    padding: 14px;
    width: 100%;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    background: linear-gradient(90deg, #3b82f6, #6366f1);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.download:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(99,102,241,0.4);
}

/* RESPONSIVE */
@media(max-width: 900px) {
    .container {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<div class="header">
    <span>Create beautiful QR codes in seconds</span>
</div>

<div class="container">

<!-- LEFT -->
<div class="left">

<form method="POST">
    <div class="input-box">
        <input type="text" name="data" placeholder="Enter URL or text..." required>
        <button type="submit">Generate</button>
    </div>
</form>

<h3 style="margin-top:20px;">Choose QR type</h3>

<div class="grid">
    <div class="card">📄 PDF</div>
    <div class="card">🔗 Links</div>
    <div class="card">👤 vCard</div>
    <div class="card">🏢 Business</div>
    <div class="card">🎥 Video</div>
    <div class="card">🖼️ Images</div>
    <div class="card">📘 Facebook</div>
    <div class="card">📷 Instagram</div>
    <div class="card">🌐 Social</div>
    <div class="card">💬 WhatsApp</div>
    <div class="card">🎵 MP3</div>
    <div class="card">📱 Apps</div>
    <div class="card">📋 Menu</div>
    <div class="card">🎟️ Coupon</div>
    <div class="card">📶 WiFi</div>
    <div class="card">🌍 Website</div>
</div>

</div>

<!-- RIGHT -->
<div class="right">

<div class="qr-box">
    <img src="{{ url_for('static', filename='qr.png') }}">
</div>

<a href="/download">
    <button class="download">Download QR Code</button>
</a>

</div>

</div>

</body>
</html>
