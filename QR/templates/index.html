<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Generator</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
}

.header {
    text-align: center;
    padding: 30px;
    font-size: 30px;
    font-weight: 600;
}

.header span {
    background: linear-gradient(90deg, #3b82f6, #6366f1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.container {
    display: flex;
    padding: 20px;
    gap: 20px;
}

.left {
    flex: 2;
    background: rgba(255,255,255,0.9);
    padding: 25px;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
}

.input-box {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.input-box input[type="text"] {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.generate-btn {
    padding: 14px 22px;
    background: linear-gradient(90deg, #3b82f6, #6366f1);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
    font-weight: 500;
}

.generate-btn:hover {
    opacity: 0.9;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-top: 20px;
}

.card {
    padding: 16px;
    border-radius: 12px;
    background: #ffffff;
    border: 1px solid #e5e7eb;
    cursor: pointer;
    transition: 0.25s;
    font-weight: 500;
}

.card:hover {
    background: #eff6ff;
}

.card.active {
    background: #3b82f6;
    color: white;
}

.right {
    flex: 1;
    text-align: center;
}

.qr-box {
    background: white;
    padding: 40px;
    border-radius: 16px;
    border: 2px dashed #d1d5db;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 300px;
    overflow: hidden;
}

.qr-box img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
}

.download {
    margin-top: 15px;
    padding: 14px;
    width: 100%;
    border-radius: 10px;
    border: none;
    background: #6366f1;
    color: white;
    cursor: pointer;
    transition: 0.3s;
    font-weight: 500;
}

.download:hover {
    background: #4f46e5;
}

.color-section {
    margin-top: auto;
    padding: 15px;
    background: #f0f4f8;
    border-radius: 12px;
}

.color-section h4 {
    margin: 0 0 12px 0;
    color: #1e293b;
    font-size: 14px;
}

.color-controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 12px;
}

.color-input-group {
    display: flex;
    align-items: center;
    gap: 10px;
}

.color-input-group label {
    font-size: 12px;
    color: #475569;
    flex: 1;
}

.color-input-group input[type="color"] {
    width: 45px;
    height: 35px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.apply-colors-btn {
    width: 100%;
    padding: 10px;
    background: linear-gradient(90deg, #8b5cf6, #6366f1);
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    font-weight: 500;
    transition: 0.3s;
    font-size: 13px;
}

.apply-colors-btn:hover {
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="header">
    <span>Create QR codes</span>
</div>

<div class="container">

<div class="left">

<form method="POST" id="qr-form">
    <input type="hidden" name="style" id="style-input" value="square">
    <input type="hidden" name="qr-color" id="qr-color-input" value="#000000">
    <input type="hidden" name="qr-bg" id="qr-bg-input" value="#ffffff">
    <input type="hidden" name="selected-type" id="selected-type" value="website">

    <div id="dynamic-input" class="input-box">
        <input type="text" name="data" id="main-input" placeholder="Enter text..." required>
        <button type="submit" class="generate-btn">Generate</button>
    </div>
</form>

<h3>Choose QR type</h3>
<div class="grid" id="type-grid">
    <div class="card active" onclick="selectType(this,'website')">🌍 Website</div>
    <div class="card" onclick="selectType(this,'instagram')">📷 Instagram</div>
    <div class="card" onclick="selectType(this,'whatsapp')">💬 WhatsApp</div>
    <div class="card" onclick="selectType(this,'wifi')">📶 WiFi</div>
    <div class="card" onclick="selectType(this,'snapchat')">👻 Snapchat</div>
    <div class="card" onclick="selectType(this,'facebook')">📘 Facebook</div>
</div>

<h3>Choose Style</h3>
<div class="grid" id="style-grid">
    <div class="card active" onclick="selectStyle(this,'dot')">⚫ Dot</div>
    <div class="card" onclick="selectStyle(this,'heart')">❤️ Heart</div>
    <div class="card" onclick="selectStyle(this,'diamond')">✨ Diamond</div>
    <div class="card" onclick="selectStyle(this,'pixel')">🟦 Pixel</div>
</div>

<!-- COLOR CUSTOMIZATION AT BOTTOM -->
<div class="color-section">
    <h4>🎨 Customize Colors</h4>
    <div class="color-controls">
        <div class="color-input-group">
            <label for="qr-color">QR Color</label>
            <input type="color" id="qr-color" value="#000000">
        </div>
        <div class="color-input-group">
            <label for="qr-bg">BG Color</label>
            <input type="color" id="qr-bg" value="#ffffff">
        </div>
    </div>
    <button type="button" class="apply-colors-btn" onclick="updateColors()">Apply Colors</button>
</div>

</div>

<div class="right">

<div class="qr-box">
    <img src="{{ url_for('static', filename='qr.png') }}?t={{ range(1,10000)|random }}">
</div>

<a href="/download">
    <button class="download">Download QR Code</button>
</a>

</div>

</div>

<script>
let selectedType = 'website';
let selectedStyle = 'dot';

function selectType(element, type) {
    const typeGrid = document.getElementById('type-grid');
    typeGrid.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    element.classList.add('active');
    selectedType = type;

    let container = document.getElementById("dynamic-input");
    let inputField = container.querySelector("input[type='text']");
    let value = inputField ? inputField.value : "";

    // Update form input based on type selection
    switch(type) {
        case "website":
            inputField.placeholder = "Enter Website URL...";
            inputField.name = "data";
            break;
        case "whatsapp":
            inputField.placeholder = "Enter Phone Number...";
            inputField.name = "phone";
            break;
        case "instagram":
            inputField.placeholder = "Enter Instagram Username...";
            inputField.name = "instagram";
            break;
        case "facebook":
            inputField.placeholder = "Enter Facebook Username...";
            inputField.name = "facebook";
            break;
        case "snapchat":
            inputField.placeholder = "Enter Snapchat Username...";
            inputField.name = "snapchat";
            break;
        case "wifi":
            if (!container.querySelector("input[name='ssid']")) {
                container.innerHTML = `
                    <input type="text" name="ssid" placeholder="WiFi Name" required>
                    <input type="text" name="password" placeholder="WiFi Password" required>
                    <button type="submit" class="generate-btn">Generate</button>
                `;
            }
            return;
    }

    // Reset to single input for non-wifi types
    if (type !== "wifi") {
        container.innerHTML = `
            <input type="text" name="${type === 'website' ? 'data' : type}" value="${value}" placeholder="Enter ${type}..." required>
            <button type="submit" class="generate-btn">Generate</button>
        `;
    }
}

function selectStyle(element, style) {
    const styleGrid = document.getElementById('style-grid');
    styleGrid.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    element.classList.add('active');
    selectedStyle = style;
    // Does NOT submit form - just updates selection
}

function updateColors() {
    let qrColor = document.getElementById('qr-color').value;
    let qrBg = document.getElementById('qr-bg').value;
    
    document.getElementById('qr-color-input').value = qrColor;
    document.getElementById('qr-bg-input').value = qrBg;
    
    // Submit form with colors only - preserves QR state
    document.getElementById('qr-form').submit();
}

// Intercept form submission to add style
document.getElementById('qr-form').addEventListener('submit', function(e) {
    document.getElementById('style-input').value = selectedStyle;
    document.getElementById('selected-type').value = selectedType;
});
</script>

</body>
</html>
