<!DOCTYPE html>
<html>
<head>
<title>QR Generator</title>
<style>
body{font-family:sans-serif;background:#f4f7fb}
.container{display:flex;gap:20px;padding:20px}
.left{flex:2;background:#fff;padding:20px;border-radius:12px}
.right{flex:1;text-align:center}
input,select{padding:10px;margin:5px;width:100%}
button{padding:10px;background:#3b82f6;color:#fff;border:none}
.qr-box{padding:20px;background:#fff;border-radius:12px}
</style>
</head>
<body>

<div class="container">

<div class="left">
<form method="POST">
<input name="data" placeholder="Enter URL">

<label>Color</label>
<input type="color" name="color" value="#000000">

<label>Background</label>
<input type="color" name="bg" value="#ffffff">

<label>Style</label>
<select name="style">
<option value="rounded">Rounded</option>
<option value="dots">Dots</option>
</select>

<label>Frame</label>
<select name="frame">
<option value="none">None</option>
<option value="black">Black</option>
<option value="rounded">Rounded</option>
</select>

<label>Tracking</label>
<select name="mode">
<option value="direct">Direct</option>
<option value="track">Track</option>
</select>

<button>Generate</button>
</form>
</div>

<div class="right">
<div class="qr-box">
<img src="/static/qr.png">
</div>
<a href="/download"><button>Download</button></a>
</div>

</div>

</body>
</html>
