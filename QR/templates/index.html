<!DOCTYPE html>
<html>
<head>
    <title>QR PRO MAX</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=3">
</head>
<body>
<div class="container">
    <h1>🚀 QR Code Generator</h1>

    <!-- -------- FORM FOR PERMANENT QR -------- -->
    <form method="POST">

        <!-- SELECT TYPE -->
        <label>QR Type:</label>
        <select name="type" id="type" onchange="updateFields()">
            <option value="text">Text</option>
            <option value="whatsapp">WhatsApp</option>
            <option value="instagram">Instagram</option>
            <option value="email">Email</option>
            <option value="phone">Phone</option>
            <option value="wifi">WiFi</option>
        </select>

        <!-- DYNAMIC INPUTS -->
        <div id="dynamicFields"></div>

        <!-- COLOR OPTIONS -->
        <label>QR Color:</label>
        <input type="color" id="qrColor" name="color" value="#000000">

        <label>Background:</label>
        <input type="color" id="bgColor" name="bgcolor" value="#ffffff">

        <!-- FRAME AND STYLE -->
        <label>Frame:</label>
        <select name="frame">
            <option value="none">None</option>
            <option value="black">Black</option>
            <option value="rounded">Rounded</option>
        </select>

        <label>Pattern:</label>
        <select name="style">
            <option value="square">Square</option>
            <option value="dots">Dots</option>
            <option value="rounded">Rounded</option>
        </select>

        <label>Mode:</label>
        <select name="mode">
            <option value="normal">Normal</option>
            <option value="track">Track</option>
        </select>

        <button type="submit">Generate QR</button>
    </form>

    <!-- -------- QR PREVIEW -------- -->
    <h2>Live Preview</h2>
    <img id="qrPreview" src="/static/qr_codes/live.png" width="200">

    <br><br>
    <a href="/dashboard">📊 Dashboard</a>
</div>

<script>
// ---------------- DYNAMIC INPUTS ----------------
function updateFields() {
    let type = document.getElementById("type").value;
    let container = document.getElementById("dynamicFields");

    if (type === "text") {
        container.innerHTML = `<input type="text" name="value" oninput="liveQR()" placeholder="Enter text">`;
    } else if (type === "whatsapp") {
        container.innerHTML = `<input type="text" name="value" oninput="liveQR()" placeholder="91XXXXXXXXXX">`;
    } else if (type === "instagram") {
        container.innerHTML = `<input type="text" name="value" oninput="liveQR()" placeholder="username">`;
    } else if (type === "email") {
        container.innerHTML = `<input type="email" name="value" oninput="liveQR()" placeholder="email">`;
    } else if (type === "phone") {
        container.innerHTML = `<input type="text" name="value" oninput="liveQR()" placeholder="phone">`;
    } else if (type === "wifi") {
        container.innerHTML = `
            <input type="text" name="ssid" oninput="liveQR()" placeholder="WiFi Name">
            <input type="text" name="password" oninput="liveQR()" placeholder="Password">
        `;
    }
}

// ---------------- LIVE QR GENERATION ----------------
function liveQR() {
    let form = document.querySelector("form");
    let formData = new FormData(form);

    fetch("/generate", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("qrPreview").src = data.qr + "?t=" + new Date().getTime();
    })
    .catch(err => console.log(err));
}

// ---------------- COLOR PICKERS ----------------
document.getElementById("qrColor").addEventListener("input", liveQR);
document.getElementById("bgColor").addEventListener("input", liveQR);

// ---------------- INIT ----------------
window.onload = () => {
    updateFields();
    liveQR();
};
</script>
</body>
</html>
