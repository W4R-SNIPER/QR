<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Generator</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
}

.header {
    text-align: center;
    padding: 30px;
    font-size: 30px;
    font-weight: 600;
}

.header span {
    background: linear-gradient(90deg, #3b82f6, #6366f1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.container {
    display: flex;
    padding: 20px;
    gap: 20px;
}

.left {
    flex: 2;
    background: rgba(255,255,255,0.9);
    padding: 25px;
    border-radius: 16px;
}

.input-box {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.input-box input[type="text"] {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.input-box button {
    padding: 14px 22px;
    background: linear-gradient(90deg, #3b82f6, #6366f1);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.input-box button:hover {
    opacity: 0.9;
}

.color-section {
    margin-top: 20px;
    padding: 15px;
    background: #f0f4f8;
    border-radius: 12px;
}

.color-section h4 {
    margin: 0 0 12px 0;
    color: #1e293b;
}

.color-controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 15px;
}

.color-input-group {
    display: flex;
    align-items: center;
    gap: 10px;
}

.color-input-group label {
    font-size: 14px;
    color: #475569;
    flex: 1;
}

.color-input-group input[type="color"] {
    width: 50px;
    height: 40px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-top: 20px;
}

.card {
    padding: 16px;
    border-radius: 12px;
    background: #ffffff;
    border: 1px solid #e5e7eb;
    cursor: pointer;
    transition: 0.25s;
    font-weight: 500;
}

.card:hover {
    background: #eff6ff;
}

.card.active {
    background: #3b82f6;
    color: white;
}

.right {
    flex: 1;
    text-align: center;
}

.qr-box {
    background: white;
    padding: 40px;
    border-radius: 16px;
    border: 2px dashed #d1d5db;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 300px;
    overflow: hidden;
}

.qr-box img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
}

.download {
    margin-top: 15px;
    padding: 14px;
    width: 100%;
    border-radius: 10px;
    border: none;
    background: #6366f1;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.download:hover {
    background: #4f46e5;
}
</style>
</head>

<body>

<div class="header">
    <span>Create QR codes</span>
</div>

<div class="container">

<div class="left">

<form method="POST" id="qr-form">
    <input type="hidden" name="style" id="style-input" value="square">
    <input type="hidden" name="qr-color" id="qr-color-input" value="#000000">
    <input type="hidden" name="qr-bg" id="qr-bg-input" value="#ffffff">

    <div id="dynamic-input" class="input-box">
        <input type="text" name="data" id="main-input" placeholder="Enter text..." required>
    </div>
</form>

<!-- COLOR CUSTOMIZATION -->
<div class="color-section">
    <h4>🎨 Customize Colors</h4>
    <div class="color-controls">
        <div class="color-input-group">
            <label for="qr-color">QR Modules Color</label>
            <input type="color" id="qr-color" value="#000000">
        </div>
        <div class="color-input-group">
            <label for="qr-bg">Background Color</label>
            <input type="color" id="qr-bg" value="#ffffff">
        </div>
    </div>
    <button type="button" class="input-box button" onclick="updateColors()" style="width: 100%; background: linear-gradient(90deg, #8b5cf6, #6366f1); border: none; border-radius: 10px; color: white; padding: 10px; cursor: pointer; font-weight: 500;">Apply Colors</button>
</div>

<h3>Choose QR type</h3>

<div class="grid" id="type-grid">
    <div class="card" onclick="selectType(this,'website')">🌍 Website</div>
    <div class="card" onclick="selectType(this,'instagram')">📷 Instagram</div>
    <div class="card" onclick="selectType(this,'whatsapp')">💬 WhatsApp</div>
    <div class="card" onclick="selectType(this,'wifi')">📶 WiFi</div>
    <div class="card" onclick="selectType(this,'snapchat')">👻 Snapchat</div>
    <div class="card" onclick="selectType(this,'facebook')">📘 Facebook</div>
</div>

<h3>Choose Style</h3>
<div class="grid" id="style-grid">
    <div class="card" onclick="selectStyle(this,'dot')">⚫ Dot</div>
    <div class="card" onclick="selectStyle(this,'heart')">❤️ Heart</div>
    <div class="card" onclick="selectStyle(this,'diamond')">✨ Diamond</div>
    <div class="card" onclick="selectStyle(this,'pixel')">🟦 Pixel</div>
</div>
</div>

<div class="right">

<div class="qr-box">
    <img src="{{ url_for('static', filename='qr.png') }}?t={{ range(1,10000)|random }}">
</div>

<a href="/download">
    <button class="download">Download QR Code</button>
</a>

</div>

</div>

<script>
function selectType(element, type) {
    const typeGrid = document.getElementById('type-grid');
    typeGrid.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    element.classList.add('active');

    let container = document.getElementById("dynamic-input");
    let styleInput = document.getElementById("style-input");
    let form = document.getElementById("qr-form");

    let inputField = container.querySelector("input");
    let value = inputField ? inputField.value : "";

    styleInput.value = "square";

    if (type === "website") {
        container.innerHTML = `
            <input type="text" name="data" value="${value}" placeholder="Enter Website URL..." required>
            <button type="submit">Generate</button>
        `;
    }
    else if (type === "whatsapp") {
        container.innerHTML = `
            <input type="text" name="phone" value="${value}" placeholder="Enter Phone Number..." required>
            <button type="submit">Generate</button>
        `;
    }
    else if (type === "instagram") {
        container.innerHTML = `
            <input type="text" name="instagram" value="${value}" placeholder="Enter Instagram Username..." required>
            <button type="submit">Generate</button>
        `;
    }
    else if (type === "facebook") {
        container.innerHTML = `
            <input type="text" name="facebook" value="${value}" placeholder="Enter Facebook Username..." required>
            <button type="submit">Generate</button>
        `;
    }
    else if (type === "snapchat") {
        container.innerHTML = `
            <input type="text" name="snapchat" value="${value}" placeholder="Enter Snapchat Username..." required>
            <button type="submit">Generate</button>
        `;
    }
    else if (type === "wifi") {
        container.innerHTML = `
            <input type="text" name="ssid" placeholder="WiFi Name" required>
            <input type="text" name="password" placeholder="WiFi Password" required>
            <button type="submit">Generate</button>
        `;
    }
}

function selectStyle(element, style) {
    const styleGrid = document.getElementById('style-grid');
    styleGrid.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    element.classList.add('active');

    let styleInput = document.getElementById("style-input");
    let form = document.getElementById("qr-form");

    styleInput.value = style;
    form.submit();
}

function updateColors() {
    let qrColor = document.getElementById('qr-color').value;
    let qrBg = document.getElementById('qr-bg').value;
    
    document.getElementById('qr-color-input').value = qrColor;
    document.getElementById('qr-bg-input').value = qrBg;
    
    document.getElementById('qr-form').submit();
}
</script>

</body>
</html>
