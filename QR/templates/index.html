<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Generator</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
}

.container {
    display: flex;
    padding: 20px;
    gap: 20px;
}

.left {
    flex: 2;
    background: white;
    padding: 20px;
    border-radius: 12px;
}

.right {
    flex: 1;
    text-align: center;
}

.card {
    padding: 12px;
    border: 1px solid #ddd;
    margin: 5px;
    cursor: pointer;
}

.card.active {
    background: #3b82f6;
    color: white;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2,1fr);
}
</style>
</head>

<body>

<div class="container">

<div class="left">

<form method="POST" id="qr-form">

<input type="hidden" name="style" id="style-input" value="square">

<div id="dynamic-input">
<input type="text" name="data" placeholder="Enter text" required>
</div>

<button type="submit">Generate QR</button>

</form>

<h3>QR Types</h3>
<div class="grid">
<div class="card" onclick="selectType(this,'website')">Website</div>
<div class="card" onclick="selectType(this,'instagram')">Instagram</div>
<div class="card" onclick="selectType(this,'whatsapp')">WhatsApp</div>
<div class="card" onclick="selectType(this,'wifi')">WiFi</div>
</div>

<h3>Styles</h3>
<div class="grid">
<div class="card" onclick="selectStyle(this,'dot')">Dot</div>
<div class="card" onclick="selectStyle(this,'heart')">Heart</div>
<div class="card" onclick="selectStyle(this,'diamond')">Diamond</div>
<div class="card" onclick="selectStyle(this,'pixel')">Pixel</div>
</div>

</div>

<div class="right">
<img src="{{ url_for('static', filename='qr.png') }}?t={{ range(1,10000)|random }}" width="200">
<br><br>
<a href="/download"><button>Download</button></a>
</div>

</div>

<script>
function selectStyle(el, style){
    document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
    el.classList.add('active');
    document.getElementById("style-input").value = style;
}

function selectType(el, type){
    let box = document.getElementById("dynamic-input");

    if(type==="wifi"){
        box.innerHTML = `
        <input name="ssid" placeholder="WiFi Name" required>
        <input name="password" placeholder="Password" required>
        `;
    }
}
</script>

</body>
</html>
